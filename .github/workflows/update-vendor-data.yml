name: Update vendor data

on:
  schedule:
    - cron: "0 4 1,15 * *" # 1st and 15th of each month at 4am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run update skill
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT=$(cat <<'EOF'
          1. Read the README.md for a description of the web application in this directory.
          2. Use the update-vendor-data skill to research upstream sources and incorporate new 
             information into the web app.
          3. Use gh to make a "chore(YYYY-MM-DD): vendor research and updates" commit with your proposed
             changes, open a pull request with the same title, and summarize the changes you're
             proposing in the pull request description.
          EOF
          )
          kiro-cli chat --no-interactive --trust-all-tools --model claude-opus-4.6 "$PROMPT"
